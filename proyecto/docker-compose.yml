services:
  postgres:
    image: postgres:16-alpine
    container_name: qbano_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: qbano_agent
      POSTGRES_USER: qbano
      POSTGRES_PASSWORD: qbano_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
